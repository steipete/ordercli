name: docker

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build --pull -t ordercli:ci .

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run --rm ordercli:ci --help
          docker run --rm --entrypoint node ordercli:ci --version
          docker run --rm --entrypoint npm ordercli:ci --version
          docker run --rm --entrypoint sh ordercli:ci -lc 'test -d "$PLAYWRIGHT_BROWSERS_PATH"'
